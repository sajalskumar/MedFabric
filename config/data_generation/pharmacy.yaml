###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#     config/data_generation/pharmacy.yaml
#
# Purpose:
#     Controls synthetic pharmacy claims generation.
#
# Description:
#     This configuration defines HOW synthetic pharmacy claims are generated.
#     It controls prescription volume, dispensing behavior, drug selection,
#     pharmacy utilization, refill patterns, days supply, quantity dispensed,
#     financials, and pharmacy claim lifecycle.
#
# Guiding Principles:
#     • Configuration defines behavior.
#     • Reference datasets contain lookup values.
#     • Python contains business logic only.
#     • No configurable values are hardcoded in Python.
#
# Reference Data:
#
#     reference/pharmacy/
#
# Used By:
#
#     src/data_generation/generators/pharmacy_generator.py
#
###############################################################################

###############################################################################
# CONFIGURATION
###############################################################################

configuration:

  version: "1.0"

  enabled: true

###############################################################################
# INPUT DATASETS
###############################################################################

inputs:

  members_dataset: "data/raw/members.parquet"

  providers_dataset: "data/raw/providers.parquet"

  enrollment_dataset: "data/raw/enrollment.parquet"

###############################################################################
# PHARMACY CLAIM IDENTIFIER
###############################################################################

pharmacy_claim_identifier:

  prefix: "RX"

  starting_sequence: 800000000

  padding_length: 12

###############################################################################
# CLAIM VOLUME
###############################################################################

claim_volume:

  average_prescriptions_per_member_per_year: 12

  minimum_prescriptions_per_member: 0

  maximum_prescriptions_per_member: 60

###############################################################################
# RXNORM
###############################################################################

rxnorm:

  use_reference_dataset: true

  source: "reference/pharmacy/rxnorm_reference.parquet"

###############################################################################
# DRUG CLASS
###############################################################################

drug_class:

  use_reference_dataset: true

  source: "reference/pharmacy/drug_class_reference.parquet"

###############################################################################
# GENERIC / BRAND
###############################################################################

generic_brand:

  use_reference_dataset: true

  source: "reference/pharmacy/generic_brand_reference.parquet"

###############################################################################
# PRESCRIPTION CHARACTERISTICS
###############################################################################

prescription:

  minimum_days_supply: 7

  maximum_days_supply: 90

  minimum_quantity_dispensed: 1

  maximum_quantity_dispensed: 180

  refill_probability: 0.55

###############################################################################
# FINANCIALS
###############################################################################

financials:

  generate_allowed_amount: true

  generate_paid_amount: true

  generate_member_liability: true

  minimum_allowed_amount: 5.00

  maximum_allowed_amount: 2500.00

  paid_amount_ratio_minimum: 0.50

  paid_amount_ratio_maximum: 0.99

###############################################################################
# DISPENSE DATES
###############################################################################

dates:

  minimum_fill_year: 2020

  maximum_fill_year: 2026

###############################################################################
# REPRODUCIBILITY
###############################################################################

reproducibility:

  use_global_random_seed: true

###############################################################################
# AUDIT
###############################################################################

audit:

  source_system: "MedFabric Synthetic Data Engine"

  record_status: "Active"

  created_at: "2026-01-01"

  updated_at: "2026-01-01"

###############################################################################
# VALIDATION
###############################################################################

validation:

  require_unique_pharmacy_claim_ids: true

  require_member_id: true

  require_provider_id: true

  require_rxnorm_code: true

  require_fill_date: true

  require_days_supply: true

  require_quantity_dispensed: true

###############################################################################
# OUTPUT
###############################################################################

output:

  dataset_name: "pharmacy_claims"

  file_name: "pharmacy_claims.parquet"

  output_format: "parquet"

###############################################################################
# METADATA
###############################################################################

metadata:

  generate_dataset_metadata: true

  generate_column_metadata: true

  generate_statistics: true

  generate_lineage: true

###############################################################################
# END OF FILE
###############################################################################