###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#     config/data_generation/reference_data.yaml
#
# Purpose:
#     Defines the reference datasets used throughout the MedFabric platform.
#
# Description:
#     This configuration serves as the master catalog of all static reference
#     data used by MedFabric. It does not contain the reference values
#     themselves; instead, it defines where those datasets are located and
#     whether they should be generated by the platform.
#
# Guiding Principles:
#     • Reference data is a platform asset.
#     • Configuration references assets.
#     • Python reads configuration.
#     • Python never hardcodes reference file locations.
#
# Used By:
#     src/data_generation/reference/build_reference_data.py
#     All engines
#     All generators
#
###############################################################################

###############################################################################
# CONFIGURATION
###############################################################################

configuration:

  version: "1.0"

  enabled: true

###############################################################################
# DEMOGRAPHICS
###############################################################################

demographics:

  first_names:
    generate: true
    output: "reference/demographics/first_names.parquet"

  last_names:
    generate: true
    output: "reference/demographics/last_names.parquet"

  race:
    generate: true
    output: "reference/demographics/race_reference.parquet"

  ethnicity:
    generate: true
    output: "reference/demographics/ethnicity_reference.parquet"

  language:
    generate: true
    output: "reference/demographics/language_reference.parquet"

###############################################################################
# GEOGRAPHY
###############################################################################

geography:

  states:
    generate: true
    output: "reference/geography/us_states.parquet"

  counties:
    generate: true
    output: "reference/geography/us_counties.parquet"

  zip_codes:
    generate: true
    output: "reference/geography/us_zip_codes.parquet"

  geography:
    generate: true
    output: "reference/geography/us_geography_reference.parquet"

###############################################################################
# PROVIDERS
###############################################################################

providers:

  taxonomy:
    generate: true
    output: "reference/providers/provider_taxonomy_reference.parquet"

