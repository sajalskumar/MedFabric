###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#     config/data_generation/facilities.yaml
#
# Purpose:
#     Controls synthetic Facility generation.
#
# Description:
#     This configuration defines HOW synthetic healthcare facilities are
#     generated. It controls Facility population size, identifiers,
#     geography assignment, contact information, naming conventions,
#     reproducibility, validation, output locations, metadata generation,
#     and audit values.
#
# Guiding Principles:
#     • Configuration defines behavior.
#     • Reference datasets contain lookup values.
#     • Python contains business logic only.
#     • No configurable values are hardcoded in Python.
#
# Reference Data:
#     reference/facilities/facility_reference.parquet
#     reference/geography/us_geography_reference.parquet
#
# Used By:
#     src/data_generation/generators/facility_generator.py
#
###############################################################################

###############################################################################
# CONFIGURATION
###############################################################################

configuration:

  version: "1.0"

  enabled: true

###############################################################################
# FACILITY POPULATION
###############################################################################

facility_population:

  total_facilities: 200

###############################################################################
# FACILITY IDENTIFIER
###############################################################################

facility_identifier:

  prefix: "FAC"

  starting_sequence: 300000000

  padding_length: 10

###############################################################################
# FACILITY REFERENCE DATA
###############################################################################

facility:

  use_reference_dataset: true

  source: "reference/facilities/facility_reference.parquet"

###############################################################################
# GEOGRAPHY
###############################################################################

geography:

  use_reference_dataset: true

  source: "reference/geography/us_geography_reference.parquet"

  geographic_distribution: "population_weighted"

###############################################################################
# FACILITY NAMING
###############################################################################

naming:

  organization_prefix: "MedFabric"

  facility_name_template: "{organization_prefix} {facility_type} {facility_id}"

###############################################################################
# CONTACT INFORMATION
###############################################################################

contact_information:

  generate_addresses: true

  generate_phone_numbers: true

  generate_email_addresses: true

  email_domain: "medfabric.example"

###############################################################################
# REPRODUCIBILITY
###############################################################################

reproducibility:

  use_global_random_seed: true

###############################################################################
# AUDIT
###############################################################################

audit:

  source_system: "MedFabric Synthetic Data Engine"

  record_status: "Active"

  created_at: "2026-01-01"

  updated_at: "2026-01-01"

###############################################################################
# VALIDATION
###############################################################################

validation:

  require_unique_facility_ids: true

  require_facility_type: true

  require_zip_code: true

###############################################################################
# OUTPUT
###############################################################################

output:

  dataset_name: "facilities"

  file_name: "facilities.parquet"

  output_format: "parquet"

###############################################################################
# METADATA
###############################################################################

metadata:

  generate_dataset_metadata: true

  generate_column_metadata: true

  generate_statistics: true

  generate_lineage: true

###############################################################################
# END OF FILE
###############################################################################