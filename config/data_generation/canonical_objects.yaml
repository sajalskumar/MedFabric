###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#     config/data_generation/canonical_objects.yaml
#
# Purpose:
#     Defines the canonical healthcare objects generated by MedFabric.
#
# Description:
#     These are the foundational healthcare business objects from which
#     all downstream datasets, analytics, dimensional models, feature stores,
#     predictive models, governance artifacts, and APIs are derived.
#
# Architecture Status:
#     LOCKED
#
# Change Control:
#     New canonical objects shall not be added without explicit approval.
#
###############################################################################

###############################################################################
# CONFIGURATION
###############################################################################

configuration:

  version: "1.0"

  enabled: true

###############################################################################
# CANONICAL HEALTHCARE OBJECTS
###############################################################################

objects:

  member:

    enabled: true

    build_order: 1

    generator: "member_generator"

    output: "members.parquet"

    description: >
      Canonical representation of a covered health plan member.

    depends_on: []

  provider:

    enabled: true

    build_order: 2

    generator: "provider_generator"

    output: "providers.parquet"

    description: >
      Canonical representation of an individual healthcare provider.

    depends_on: []

  organization:

    enabled: true

    build_order: 3

    generator: "organization_generator"

    output: "organizations.parquet"

    description: >
      Healthcare organizations including provider groups,
      integrated delivery networks, and health systems.

    depends_on:
      - provider

  facility:

    enabled: true

    build_order: 4

    generator: "facility_generator"

    output: "facilities.parquet"

    description: >
      Hospitals, clinics, ambulatory centers,
      laboratories, urgent care facilities,
      and other healthcare locations.

    depends_on:
      - organization

  enrollment:

    enabled: true

    build_order: 5

    generator: "enrollment_generator"

    output: "enrollment.parquet"

    description: >
      Member enrollment into health plans,
      products, and benefit structures.

    depends_on:
      - member

  encounter:

    enabled: true

    build_order: 6

    generator: "encounter_generator"

    output: "encounters.parquet"

    description: >
      Clinical encounter between a member
      and a provider.

    depends_on:
      - member
      - provider
      - facility
      - enrollment

  claim_header:

    enabled: true

    build_order: 7

    generator: "claim_header_generator"

    output: "claim_headers.parquet"

    description: >
      Medical claim header generated from encounters.

    depends_on:
      - encounter

  claim_line:

    enabled: true

    build_order: 8

    generator: "claim_line_generator"

    output: "claim_lines.parquet"

    description: >
      Individual service lines associated with
      a medical claim.

    depends_on:
      - claim_header

  diagnosis:

    enabled: true

    build_order: 9

    generator: "diagnosis_generator"

    output: "diagnoses.parquet"

    description: >
      Diagnosis records associated with encounters
      and claims.

    depends_on:
      - encounter
      - claim_header

  procedure:

    enabled: true

    build_order: 10

    generator: "procedure_generator"

    output: "procedures.parquet"

    description: >
      Procedure records associated with
      claim lines.

    depends_on:
      - claim_line

  pharmacy:

    enabled: true

    build_order: 11

    generator: "pharmacy_generator"

    output: "pharmacy.parquet"

    description: >
      Pharmacy dispensing events.

    depends_on:
      - member
      - provider

  laboratory:

    enabled: true

    build_order: 12

    generator: "laboratory_generator"

    output: "laboratories.parquet"

    description: >
      Laboratory orders and results.

    depends_on:
      - encounter

  sdoh:

    enabled: true

    build_order: 13

    generator: "sdoh_generator"

    output: "member_sdoh.parquet"

    description: >
      Social Determinants of Health associated
      with members.

    depends_on:
      - member

  terminology:

    enabled: true

    build_order: 14

    generator: "terminology_generator"

    output: "clinical_terminology.parquet"

    description: >
      Clinical and administrative terminology
      reference datasets.

    depends_on: []

###############################################################################
# EXECUTION
###############################################################################

execution:

  stop_on_failure: true

  validate_after_each_object: true

  generate_metadata_after_each_object: true

  write_execution_summary: true

###############################################################################
# OUTPUT
###############################################################################

output:

  output_directory: "data/raw"

  output_format: "parquet"

  overwrite_existing_files: true

###############################################################################
# METADATA
###############################################################################

metadata:

  generate_dataset_metadata: true

  generate_column_metadata: true

  generate_statistics: true

  generate_lineage: true

###############################################################################
# END OF FILE
###############################################################################