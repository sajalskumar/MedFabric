###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/drift.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Purpose:
#   Defines model drift monitoring configuration.
#
# Current Scope:
#   - Build baseline feature statistics from the current champion training run.
#
# Future Scope:
#   - Population Stability Index (PSI)
#   - Kolmogorov-Smirnov (KS) drift checks
#   - Prediction score drift
#   - Model performance drift
#
###############################################################################

drift:

  enabled: true

  build_baseline: true

  baseline_strategy: "latest_champion_training_run"

  psi_threshold: 0.20

  ks_threshold: 0.10

  
###############################################################################
# Population Stability Index (PSI)
#
# Purpose:
#   Calculates distribution drift between the training baseline and
#   production/scoring population.
#
# Interpretation:
#
#   PSI < 0.10
#       No significant population drift.
#
#   PSI 0.10 - 0.20
#       Moderate drift. Monitor closely.
#
#   PSI >= 0.20
#       Significant drift. Model review or retraining recommended.
#
###############################################################################

population_stability_index:

  enabled: true

  ###########################################################################
  # PSI Alert Threshold
  #
  # Typical industry recommendations:
  #
  #   0.10 = Early warning
  #   0.20 = Significant drift
  #   0.25 = Critical drift
  ###########################################################################

  threshold: 0.20

  ###########################################################################
  # Numeric Features
  #
  # Number of equal-frequency bins used to compare baseline and current
  # feature distributions.
  #
  # Recommended:
  #   10 bins (industry standard)
  ###########################################################################

  numeric_bin_count: 10

  ###########################################################################
  # Categorical Features
  #
  # Maximum number of categories evaluated before collapsing the remaining
  # categories into "Other".
  ###########################################################################

  categorical_max_categories: 20

  ###########################################################################
  # Numerical Stability
  #
  # Small value added when a bucket has zero observations to prevent:
  #
  #     log(0)
  #     divide-by-zero
  #
  ###########################################################################

  epsilon: 0.0001

  ks_drift:
  
    enabled: true

    ###########################################################################
    # KS Drift Alert Threshold
    #
    # Typical industry recommendations:
    #
    #   0.05 = Early warning
    #   0.10 = Significant drift
    ###########################################################################

    threshold: 0.10 
###############################################################################
# End of File
###############################################################################