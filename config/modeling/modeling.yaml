###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/modeling.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Compatibility:
#   layer_name is retained during Phase 1 for backward compatibility.
#
# Purpose:
#   Defines all configuration for the MedFabric Modeling layer.
#
# Run:
#   python -m src.modeling.build_modeling_layer
#
###############################################################################

modeling:
  capability_name: "Enterprise Modeling Framework"
  layer_name: "Layer 2D - Enterprise Modeling Framework"
  domain_name: "Modeling"
  output_format: "parquet"
  enabled: true

framework:
  version: "2.1"
  release_name: "Enterprise Modeling Framework 2.1"
  owner: "MedFabric"
  status: "active"
  configuration_type: "enterprise_modeling_framework"

logging:
  level: "INFO"
  module_log_dir: "logs/modules"
  log_file_name: "modeling_layer.log"

paths:
  inputs:
    demographic_features:
      path: "data/feature_store/demographic_features.parquet"
      format: "parquet"
      required: true

    enrollment_features:
      path: "data/feature_store/enrollment_features.parquet"
      format: "parquet"
      required: true

    claims_features:
      path: "data/feature_store/claims_features.parquet"
      format: "parquet"
      required: true

    cost_features:
      path: "data/feature_store/cost_features.parquet"
      format: "parquet"
      required: true

    utilization_features:
      path: "data/feature_store/utilization_features.parquet"
      format: "parquet"
      required: true

    laboratory_features:
      path: "data/feature_store/laboratory_features.parquet"
      format: "parquet"
      required: true

    pharmacy_features:
      path: "data/feature_store/pharmacy_features.parquet"
      format: "parquet"
      required: true

    sdoh_features:
      path: "data/feature_store/sdoh_features.parquet"
      format: "parquet"
      required: false

    temporal_features:
      path: "data/feature_store/temporal_features.parquet"
      format: "parquet"
      required: false

    risk_features:
      path: "data/feature_store/risk_features.parquet"
      format: "parquet"
      required: true

  outputs:
    modeling_root:
      path: "data/modeling"

    scoring_root:
      path: "data/scoring"

    model_root:
      path: "models"

    modeling_feature_matrix:
      path: "data/modeling/modeling_feature_matrix"

    modeling_target_summary:
      path: "data/modeling/modeling_target_summary"

    modeling_execution_summary:
      path: "data/modeling/modeling_execution_summary"

    candidate_model_leaderboard:
      path: "data/modeling/candidate_model_leaderboard"

    champion_model_summary:
      path: "data/modeling/champion_model_summary"

    cross_validation_fold_metrics:
      path: "data/modeling/cross_validation_fold_metrics"

    cross_validation_summary:
      path: "data/modeling/cross_validation_summary"

    hyperparameter_search_results:
      path: "data/modeling/hyperparameter_search_results"

    target_leakage_report:
      path: "data/modeling/target_leakage_report"

    target_quality_report:
      path: "data/modeling/target_quality_report"

    feature_baseline_statistics:
      path: "data/modeling/feature_baseline_statistics"

    model_explainability_summary:
      path: "data/modeling/model_explainability_summary"

    model_explainability_executive_summary:
      path: "data/modeling/model_explainability_executive_summary"

    permutation_importance_summary:
      path: "data/modeling/permutation_importance_summary"

    shap_explainability_summary:
      path: "data/modeling/shap_explainability_summary"

    confusion_matrix_summary:
      path: "data/modeling/confusion_matrix_summary"

    lift_gain_decile_summary:
      path: "data/modeling/lift_gain_decile_summary"

    model_drift_baseline:
      path: "data/modeling/model_drift_baseline"

    modeling_step_timings:
      path: "data/modeling/modeling_step_timings"

    modeling_performance_summary:
      path: "data/modeling/modeling_performance_summary"

    model_monitoring_summary:
      path: "data/modeling/model_monitoring_summary"

  model_outputs:
    high_cost:
      model_path: "models/high_cost/high_cost_model.pkl"
      metrics_path: "models/high_cost/high_cost_model_metrics"
      feature_importance_path: "models/high_cost/high_cost_feature_importance"
      scoring_path: "data/scoring/high_cost_scores"

    readmission:
      model_path: "models/readmission/readmission_model.pkl"
      metrics_path: "models/readmission/readmission_model_metrics"
      feature_importance_path: "models/readmission/readmission_feature_importance"
      scoring_path: "data/scoring/readmission_scores"

    er_utilization:
      model_path: "models/er_utilization/er_utilization_model.pkl"
      metrics_path: "models/er_utilization/er_utilization_model_metrics"
      feature_importance_path: "models/er_utilization/er_utilization_feature_importance"
      scoring_path: "data/scoring/er_utilization_scores"

    rising_risk:
      model_path: "models/rising_risk/rising_risk_model.pkl"
      metrics_path: "models/rising_risk/rising_risk_model_metrics"
      feature_importance_path: "models/rising_risk/rising_risk_feature_importance"
      scoring_path: "data/scoring/rising_risk_scores"

    chronic_progression:
      model_path: "models/chronic_progression/chronic_progression_model.pkl"
      metrics_path: "models/chronic_progression/chronic_progression_model_metrics"
      feature_importance_path: "models/chronic_progression/chronic_progression_feature_importance"
      scoring_path: "data/scoring/chronic_progression_scores"

    medication_non_adherence:
      model_path: "models/medication_non_adherence/medication_non_adherence_model.pkl"
      metrics_path: "models/medication_non_adherence/medication_non_adherence_model_metrics"
      feature_importance_path: "models/medication_non_adherence/medication_non_adherence_feature_importance"
      scoring_path: "data/scoring/medication_non_adherence_scores"

    avoidable_admission:
      model_path: "models/avoidable_admission/avoidable_admission_model.pkl"
      metrics_path: "models/avoidable_admission/avoidable_admission_model_metrics"
      feature_importance_path: "models/avoidable_admission/avoidable_admission_feature_importance"
      scoring_path: "data/scoring/avoidable_admission_scores"

    care_gap_closure:
      model_path: "models/care_gap_closure/care_gap_closure_model.pkl"
      metrics_path: "models/care_gap_closure/care_gap_closure_model_metrics"
      feature_importance_path: "models/care_gap_closure/care_gap_closure_feature_importance"
      scoring_path: "data/scoring/care_gap_closure_scores"

  metadata_outputs:
    default_output_dir:
      path: "data/metadata"

    modeling_dataset_inventory:
      path: "data/metadata/modeling_dataset_inventory"

    modeling_column_dictionary:
      path: "data/metadata/modeling_column_dictionary"

    modeling_model_registry:
      path: "data/metadata/modeling_model_registry"

    modeling_feature_registry:
      path: "data/metadata/modeling_feature_registry"

  audit_outputs:
    default_output_dir:
      path: "data/audit"

    modeling_audit_records:
      path: "data/audit/modeling_audit_records"

    modeling_validation_results:
      path: "data/audit/modeling_validation_results"

    modeling_execution_summary:
      path: "data/audit/modeling_execution_summary"

join_keys:
  member_key: "member_id"

feature_matrix:
  enabled: true
  base_dataset: "risk_features"
  member_key: "member_id"

  join_datasets:
    - "demographic_features"
    - "enrollment_features"
    - "claims_features"
    - "cost_features"
    - "utilization_features"
    - "laboratory_features"
    - "pharmacy_features"
    - "sdoh_features"
    - "temporal_features"

  exclude_columns:
    - "feature_store_run_id"
    - "feature_store_load_timestamp"
    - "feature_store_record_status"

modeling_defaults:
  random_state: 42
  test_size: 0.20
  validation_size: 0.20
  max_iter: 1000
  scoring_output_format: "parquet"
  selection_metric: "roc_auc"

  preprocessing:
    numeric_imputation_strategy: "median"
    categorical_imputation_strategy: "most_frequent"
    scale_numeric_features: true
    one_hot_encode_categorical_features: true

training:
  enabled: true
  strategy: "best_model"

  performance:
    enable_training_sample: true
    train_sample_fraction: 0.20
    min_train_rows: 1000
    max_train_rows: 5000
    sampling_strategy: "stratified"
    log_algorithm_timing: true

  cross_validation:
    enabled: true
    strategy: "stratified_kfold"
    folds: 5
    shuffle: true
    random_state: 42
    save_fold_metrics: true
    save_fold_predictions: true

  hyperparameter_search:
    enabled: true
    method: "random_search"
    folds: 3
    iterations: 3
    scoring_metric: "roc_auc"
    random_state: 42

  imbalance:
    enabled: true
    strategy: "class_weight"
    supported_strategies:
      - "none"
      - "class_weight"
      - "undersample"
      - "oversample"

  threshold_optimization:
    enabled: true
    strategy: "optimize"
    fixed_threshold: 0.50
    optimization_metric: "f1"

  probability_calibration:
    enabled: true
    method: "sigmoid"
    cv: 3

  metrics:
    primary_metric: "roc_auc"
    secondary_metrics:
      - "accuracy"
      - "precision"
      - "recall"
      - "f1"
      - "balanced_accuracy"

  algorithms:
    dummy_classifier:
      enabled: true
      name: "Dummy Classifier"
      model_type: "classification"
      parameters:
        strategy: "most_frequent"

    logistic_regression:
      enabled: true
      name: "Logistic Regression"
      model_type: "classification"
      parameters:
        penalty: "l2"
        C: 1.0
        solver: "lbfgs"
        max_iter: 500
        class_weight: null

    random_forest:
      enabled: true
      name: "Random Forest"
      model_type: "classification"
      parameters:
        n_estimators: 50
        max_depth: 8
        min_samples_split: 10
        min_samples_leaf: 5
        class_weight: null
        n_jobs: -1

    extra_trees:
      enabled: false
      name: "Extra Trees"
      model_type: "classification"
      parameters:
        n_estimators: 200
        max_depth: null
        min_samples_split: 2
        min_samples_leaf: 1
        class_weight: null
        n_jobs: -1

    gradient_boosting:
      enabled: false
      name: "Gradient Boosting"
      model_type: "classification"
      parameters:
        n_estimators: 100
        learning_rate: 0.1
        max_depth: 3

    hist_gradient_boosting:
      enabled: false
      name: "Histogram Gradient Boosting"
      model_type: "classification"
      parameters:
        max_iter: 100
        learning_rate: 0.1
        max_leaf_nodes: 31

    adaboost:
      enabled: false
      name: "AdaBoost"
      model_type: "classification"
      parameters:
        n_estimators: 100
        learning_rate: 1.0

experiments:
  enabled: false
  save_all_candidate_results: true
  retain_top_n_candidates: 10
  include_algorithm_parameters: true
  include_training_sample_details: true
  include_timing_details: true

explainability:
  enabled: true

  feature_importance:
    enabled: true
    method: "model_native"

  permutation_importance:
    enabled: true
    scoring_metric: "roc_auc"
    n_repeats: 5
    sample_row_count: 300
    random_state: 42

  shap:
    enabled: true
    sample_row_count: 100
    background_row_count: 25
    random_state: 42

  partial_dependence:
    enabled: false

drift:
  enabled: true
  build_baseline: true
  baseline_strategy: "latest_champion_training_run"
  psi_threshold: 0.20
  ks_threshold: 0.10

models:
  high_cost:
    enabled: true
    model_name: "High Cost Model"
    model_type: "classification"

    target:
      strategy: "quantile"
      output_column: "high_cost_target"
      source:
        dataset: "cost_features"
        column: "total_paid_amount"
      parameters:
        quantile: 0.90
        positive_direction: "greater_than_or_equal"

    score_column: "high_cost_risk_score"
    prediction_column: "high_cost_prediction"
    risk_tier_column: "high_cost_risk_tier"
    positive_label: 1

  readmission:
    enabled: true
    model_name: "Readmission Model"
    model_type: "classification"

    target:
      strategy: "weighted_score"
      output_column: "readmission_target"
      components:
        - dataset: "utilization_features"
          column: "total_claims"
          weight: 0.35
          direction: "positive"
        - dataset: "cost_features"
          column: "total_allowed_amount"
          weight: 0.20
          direction: "positive"
        - dataset: "cost_features"
          column: "total_paid_amount"
          weight: 0.20
          direction: "positive"
        - dataset: "pharmacy_features"
          column: "total_pharmacy_claims"
          weight: 0.10
          direction: "positive"
        - dataset: "sdoh_features"
          column: "latest_sdoh_risk_score"
          weight: 0.15
          direction: "positive"
      parameters:
        quantile: 0.85
        positive_direction: "greater_than_or_equal"

    score_column: "readmission_risk_score"
    prediction_column: "readmission_prediction"
    risk_tier_column: "readmission_risk_tier"
    positive_label: 1

  er_utilization:
    enabled: true
    model_name: "ER Utilization Model"
    model_type: "classification"

    target:
      strategy: "quantile"
      output_column: "er_utilization_target"
      source:
        dataset: "utilization_features"
        column: "total_claims"
      parameters:
        quantile: 0.85
        positive_direction: "greater_than_or_equal"

    score_column: "er_utilization_risk_score"
    prediction_column: "er_utilization_prediction"
    risk_tier_column: "er_utilization_risk_tier"
    positive_label: 1

  rising_risk:
    enabled: true
    model_name: "Rising Risk Model"
    model_type: "classification"

    target:
      strategy: "quantile"
      output_column: "rising_risk_target"
      source:
        dataset: "risk_features"
        column: "latest_sdoh_risk_score"
      parameters:
        quantile: 0.85
        positive_direction: "greater_than_or_equal"

    score_column: "rising_risk_score"
    prediction_column: "rising_risk_prediction"
    risk_tier_column: "rising_risk_tier"
    positive_label: 1

  chronic_progression:
    enabled: true
    model_name: "Chronic Progression Model"
    model_type: "classification"

    target:
      strategy: "quantile"
      output_column: "chronic_progression_target"
      source:
        dataset: "risk_features"
        column: "latest_sdoh_risk_score"
      parameters:
        quantile: 0.85
        positive_direction: "greater_than_or_equal"

    score_column: "chronic_progression_risk_score"
    prediction_column: "chronic_progression_prediction"
    risk_tier_column: "chronic_progression_risk_tier"
    positive_label: 1

  medication_non_adherence:
    enabled: true
    model_name: "Medication Non-Adherence Model"
    model_type: "classification"

    target:
      strategy: "quantile"
      output_column: "medication_non_adherence_target"
      source:
        dataset: "pharmacy_features"
        column: "total_pharmacy_claims"
      parameters:
        quantile: 0.20
        positive_direction: "less_than_or_equal"

    score_column: "medication_non_adherence_risk_score"
    prediction_column: "medication_non_adherence_prediction"
    risk_tier_column: "medication_non_adherence_risk_tier"
    positive_label: 1

  avoidable_admission:
    enabled: true
    model_name: "Avoidable Admission Model"
    model_type: "classification"

    target:
      strategy: "existing_column"
      output_column: "high_cost_risk_signal"

    score_column: "avoidable_admission_risk_score"
    prediction_column: "avoidable_admission_prediction"
    risk_tier_column: "avoidable_admission_risk_tier"
    positive_label: 1

  care_gap_closure:
    enabled: true
    model_name: "Care Gap Closure Model"
    model_type: "classification"

    target:
      strategy: "quantile"
      output_column: "care_gap_closure_target"
      source:
        dataset: "laboratory_features"
        column: "abnormal_lab_rate"
      parameters:
        quantile: 0.50
        positive_direction: "less_than_or_equal"

    score_column: "care_gap_closure_score"
    prediction_column: "care_gap_closure_prediction"
    risk_tier_column: "care_gap_closure_tier"
    positive_label: 1

risk_tiers:
  very_high:
    min_value: 0.85
    max_value: 1.00
    label: "Very High"
    priority_rank: 1

  high:
    min_value: 0.70
    max_value: 0.849999
    label: "High"
    priority_rank: 2

  moderate:
    min_value: 0.40
    max_value: 0.699999
    label: "Moderate"
    priority_rank: 3

  low:
    min_value: 0.00
    max_value: 0.399999
    label: "Low"
    priority_rank: 4

scoring:
  enabled: true
  score_full_population: true
  include_probability: true
  include_prediction: true
  include_risk_tier: true
  include_model_metadata: true
  include_run_id: true
  include_scoring_timestamp: true

validation:
  enabled: true

  rules:
    required_inputs_exist:
      enabled: true
      severity: "ERROR"

    required_columns_exist:
      enabled: true
      severity: "ERROR"

    datasets_not_empty:
      enabled: true
      severity: "ERROR"

    member_key_not_null:
      enabled: true
      severity: "ERROR"

    target_distribution_check:
      enabled: true
      severity: "WARNING"

    target_leakage_check:
      enabled: true
      severity: "ERROR"

    model_training_success_check:
      enabled: true
      severity: "ERROR"

    scoring_output_row_count_check:
      enabled: true
      severity: "WARNING"

    candidate_leaderboard_check:
      enabled: true
      severity: "WARNING"

    champion_model_selected_check:
      enabled: true
      severity: "ERROR"

metadata:
  enabled: true
  include_column_statistics: true
  include_dataset_inventory: true
  include_feature_registry: true
  include_model_registry: true
  include_lineage: true
  include_candidate_leaderboard: true
  include_champion_summary: true
  include_algorithm_parameters: true
  include_training_sample_details: true

audit:
  enabled: true
  include_step_audit: true
  include_validation_results: true
  include_execution_summary: true
  include_training_timing: true
  include_champion_selection_reason: true

leakage_detection:
  enabled: true
  exclude_target_source_dataset: true
  correlation_check_enabled: true
  correlation_threshold: 0.995

  exclude_patterns:
    - "*target*"
    - "*signal*"
    - "*high_cost_member_flag*"
    - "*paid_amount*"
    - "*allowed_amount*"

  additional_columns:
    - "high_cost_risk_signal"
    - "high_cost_member_flag"
    - "clinical_risk_signal"
    - "sdoh_risk_signal"
    - "total_paid_amount"
    - "claims_features__total_paid_amount"
    - "cost_features__total_paid_amount"
    - "total_allowed_amount"
    - "cost_features__total_allowed_amount"
    - "total_pharmacy_paid_amount"
    - "pharmacy_features__total_pharmacy_paid_amount"

  source_domain_proxy_patterns:
    cost_features:
      - "*paid_amount*"
      - "*allowed_amount*"
      - "*cost*"
      - "*high_cost*"

    claims_features:
      - "*claim*"
      - "*paid_amount*"
      - "*allowed_amount*"
      - "*utilization*"
      - "*high_cost*"

    utilization_features:
      - "*claim*"
      - "*utilization*"
      - "*paid_amount*"
      - "*allowed_amount*"
      - "*high_cost*"

    risk_features:
      - "*risk_score*"
      - "*risk_signal*"
      - "*sdoh*"
      - "*high_sdoh*"

    sdoh_features:
      - "*sdoh*"
      - "*social*"
      - "*risk_score*"
      - "*high_sdoh*"

    pharmacy_features:
      - "*pharmacy*"
      - "*medication*"
      - "*drug*"
      - "*adherence*"

    laboratory_features:
      - "*lab*"
      - "*abnormal*"
      - "*clinical_risk*"