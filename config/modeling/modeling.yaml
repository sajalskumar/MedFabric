###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/modeling.yaml
#
# Layer:
#   Layer 2D - Model Training & Scoring
#
# Purpose:
#   Defines configuration for MedFabric model training and model scoring.
#
# Architectural Rule:
#   Modeling is independent of the Analytics Platform.
#
#   Modeling consumes Feature Store outputs and produces model artifacts,
#   model metadata, feature importance outputs, model metrics, and scoring
#   datasets.
#
#   Modeling must NOT depend on:
#
#     data/analytics_platform/
#
#   Predictive Analytics will later consume model scoring outputs.
#
# Inputs:
#   Feature Store:
#     - data/feature_store/demographic_features.parquet
#     - data/feature_store/enrollment_features.parquet
#     - data/feature_store/claims_features.parquet
#     - data/feature_store/cost_features.parquet
#     - data/feature_store/utilization_features.parquet
#     - data/feature_store/laboratory_features.parquet
#     - data/feature_store/pharmacy_features.parquet
#     - data/feature_store/sdoh_features.parquet
#     - data/feature_store/provider_attribution_features.parquet
#     - data/feature_store/temporal_features.parquet
#     - data/feature_store/risk_features.parquet
#
# Outputs:
#   models/
#   data/modeling/
#   data/scoring/
#   data/metadata/
#   data/audit/
#
# Run:
#   python -m src.modeling.build_modeling_layer
#
###############################################################################

modeling:
  layer_name: "Layer 2D - Model Training & Scoring"
  domain_name: "Modeling"
  output_format: "parquet"
  enabled: true

###############################################################################
# Logging
###############################################################################

logging:
  level: "INFO"
  module_log_dir: "logs/modules"
  log_file_name: "modeling_layer.log"

###############################################################################
# Paths
###############################################################################

paths:

  ###########################################################################
  # Feature Store Inputs
  ###########################################################################

  inputs:

    demographic_features:
      path: "data/feature_store/demographic_features.parquet"
      format: "parquet"
      required: true

    enrollment_features:
      path: "data/feature_store/enrollment_features.parquet"
      format: "parquet"
      required: true

    claims_features:
      path: "data/feature_store/claims_features.parquet"
      format: "parquet"
      required: true

    cost_features:
      path: "data/feature_store/cost_features.parquet"
      format: "parquet"
      required: true

    utilization_features:
      path: "data/feature_store/utilization_features.parquet"
      format: "parquet"
      required: true

    laboratory_features:
      path: "data/feature_store/laboratory_features.parquet"
      format: "parquet"
      required: true

    pharmacy_features:
      path: "data/feature_store/pharmacy_features.parquet"
      format: "parquet"
      required: true

    sdoh_features:
      path: "data/feature_store/sdoh_features.parquet"
      format: "parquet"
      required: false

    temporal_features:
      path: "data/feature_store/temporal_features.parquet"
      format: "parquet"
      required: false

    risk_features:
      path: "data/feature_store/risk_features.parquet"
      format: "parquet"
      required: true

  ###########################################################################
  # Modeling Outputs
  ###########################################################################

  outputs:

    modeling_root:
      path: "data/modeling"

    scoring_root:
      path: "data/scoring"

    model_root:
      path: "models"

    modeling_feature_matrix:
      path: "data/modeling/modeling_feature_matrix"

    modeling_target_summary:
      path: "data/modeling/modeling_target_summary"

    modeling_execution_summary:
      path: "data/modeling/modeling_execution_summary"

  ###########################################################################
  # Model Artifact Outputs
  ###########################################################################

  model_outputs:

    high_cost:
      model_path: "models/high_cost/high_cost_model.pkl"
      metrics_path: "models/high_cost/high_cost_model_metrics"
      feature_importance_path: "models/high_cost/high_cost_feature_importance"
      scoring_path: "data/scoring/high_cost_scores"

    readmission:
      model_path: "models/readmission/readmission_model.pkl"
      metrics_path: "models/readmission/readmission_model_metrics"
      feature_importance_path: "models/readmission/readmission_feature_importance"
      scoring_path: "data/scoring/readmission_scores"

    er_utilization:
      model_path: "models/er_utilization/er_utilization_model.pkl"
      metrics_path: "models/er_utilization/er_utilization_model_metrics"
      feature_importance_path: "models/er_utilization/er_utilization_feature_importance"
      scoring_path: "data/scoring/er_utilization_scores"

    rising_risk:
      model_path: "models/rising_risk/rising_risk_model.pkl"
      metrics_path: "models/rising_risk/rising_risk_model_metrics"
      feature_importance_path: "models/rising_risk/rising_risk_feature_importance"
      scoring_path: "data/scoring/rising_risk_scores"

    chronic_progression:
      model_path: "models/chronic_progression/chronic_progression_model.pkl"
      metrics_path: "models/chronic_progression/chronic_progression_model_metrics"
      feature_importance_path: "models/chronic_progression/chronic_progression_feature_importance"
      scoring_path: "data/scoring/chronic_progression_scores"

    medication_non_adherence:
      model_path: "models/medication_non_adherence/medication_non_adherence_model.pkl"
      metrics_path: "models/medication_non_adherence/medication_non_adherence_model_metrics"
      feature_importance_path: "models/medication_non_adherence/medication_non_adherence_feature_importance"
      scoring_path: "data/scoring/medication_non_adherence_scores"

    avoidable_admission:
      model_path: "models/avoidable_admission/avoidable_admission_model.pkl"
      metrics_path: "models/avoidable_admission/avoidable_admission_model_metrics"
      feature_importance_path: "models/avoidable_admission/avoidable_admission_feature_importance"
      scoring_path: "data/scoring/avoidable_admission_scores"

    care_gap_closure:
      model_path: "models/care_gap_closure/care_gap_closure_model.pkl"
      metrics_path: "models/care_gap_closure/care_gap_closure_model_metrics"
      feature_importance_path: "models/care_gap_closure/care_gap_closure_feature_importance"
      scoring_path: "data/scoring/care_gap_closure_scores"

  ###########################################################################
  # Metadata Outputs
  ###########################################################################

  metadata_outputs:

    default_output_dir:
      path: "data/metadata"

    modeling_dataset_inventory:
      path: "data/metadata/modeling_dataset_inventory"

    modeling_column_dictionary:
      path: "data/metadata/modeling_column_dictionary"

    modeling_model_registry:
      path: "data/metadata/modeling_model_registry"

    modeling_feature_registry:
      path: "data/metadata/modeling_feature_registry"

  ###########################################################################
  # Audit Outputs
  ###########################################################################

  audit_outputs:

    default_output_dir:
      path: "data/audit"

    modeling_audit_records:
      path: "data/audit/modeling_audit_records"

    modeling_validation_results:
      path: "data/audit/modeling_validation_results"

    modeling_execution_summary:
      path: "data/audit/modeling_execution_summary"

###############################################################################
# Join Keys
###############################################################################

join_keys:

  member_key: "member_id"

###############################################################################
# Feature Matrix
###############################################################################

feature_matrix:
  enabled: true

  base_dataset: "risk_features"
  member_key: "member_id"

  join_datasets:
    - "demographic_features"
    - "enrollment_features"
    - "claims_features"
    - "cost_features"
    - "utilization_features"
    - "laboratory_features"
    - "pharmacy_features"
    - "sdoh_features"
    - "temporal_features"

  exclude_columns:
    - "feature_store_run_id"
    - "feature_store_load_timestamp"
    - "feature_store_record_status"

###############################################################################
# Modeling Defaults
###############################################################################

modeling_defaults:

  random_state: 42
  test_size: 0.20
  validation_size: 0.20
  max_iter: 1000
  scoring_output_format: "parquet"

  algorithm:
    name: "random_forest_classifier"
    type: "classification"

  preprocessing:

    numeric_imputation_strategy: "median"
    categorical_imputation_strategy: "most_frequent"
    scale_numeric_features: false
    one_hot_encode_categorical_features: true

###############################################################################
# Model Definitions
###############################################################################

models:

  high_cost:
    enabled: true
    model_name: "High Cost Model"
    model_type: "classification"
    target_column: "high_cost_target"
    target_rule:
      source_dataset: "cost_features"
      source_column: "total_paid_amount"
      operator: "greater_than_or_equal"
      value: 122736.145
    score_column: "high_cost_risk_score"
    prediction_column: "high_cost_prediction"
    risk_tier_column: "high_cost_risk_tier"
    positive_label: 1

  readmission:
    enabled: true
    model_name: "Readmission Model"
    model_type: "classification"
    target_column: "readmission_target"
    target_rule:
      source_dataset: "utilization_features"
      source_column: "total_claims"
      operator: "greater_than_or_equal"
      value: 13
    score_column: "readmission_risk_score"
    prediction_column: "readmission_prediction"
    risk_tier_column: "readmission_risk_tier"
    positive_label: 1

  er_utilization:
    enabled: true
    model_name: "ER Utilization Model"
    model_type: "classification"
    target_column: "er_utilization_target"
    target_rule:
      source_dataset: "utilization_features"
      source_column: "total_claims"
      operator: "greater_than_or_equal"
      value: 12
    score_column: "er_utilization_risk_score"
    prediction_column: "er_utilization_prediction"
    risk_tier_column: "er_utilization_risk_tier"
    positive_label: 1

  rising_risk:
    enabled: true
    model_name: "Rising Risk Model"
    model_type: "classification"
    target_column: "rising_risk_target"
    target_rule:
      source_dataset: "risk_features"
      source_column: "latest_sdoh_risk_score"
      operator: "greater_than_or_equal"
      value: 14
    score_column: "rising_risk_score"
    prediction_column: "rising_risk_prediction"
    risk_tier_column: "rising_risk_tier"
    positive_label: 1

  chronic_progression:
    enabled: true
    model_name: "Chronic Progression Model"
    model_type: "classification"
    target_column: "chronic_progression_target"
    target_rule:
      source_dataset: "risk_features"
      source_column: "latest_sdoh_risk_score"
      operator: "greater_than_or_equal"
      value: 14
    score_column: "chronic_progression_risk_score"
    prediction_column: "chronic_progression_prediction"
    risk_tier_column: "chronic_progression_risk_tier"
    positive_label: 1

  medication_non_adherence:
    enabled: true
    model_name: "Medication Non-Adherence Model"
    model_type: "classification"
    target_column: "medication_non_adherence_target"
    target_rule:
      source_dataset: "pharmacy_features"
      source_column: "total_pharmacy_claims"
      operator: "less_than"
      value: 8
    score_column: "medication_non_adherence_risk_score"
    prediction_column: "medication_non_adherence_prediction"
    risk_tier_column: "medication_non_adherence_risk_tier"
    positive_label: 1

  avoidable_admission:
    enabled: true
    model_name: "Avoidable Admission Model"
    model_type: "classification"
    target_column: "avoidable_admission_target"
    target_rule:
      source_dataset: "risk_features"
      source_column: "high_cost_risk_signal"
      operator: "equals"
      value: 1
    score_column: "avoidable_admission_risk_score"
    prediction_column: "avoidable_admission_prediction"
    risk_tier_column: "avoidable_admission_risk_tier"
    positive_label: 1

  care_gap_closure:
    enabled: true
    model_name: "Care Gap Closure Model"
    model_type: "classification"
    target_column: "care_gap_closure_target"
    target_rule:
      source_dataset: "laboratory_features"
      source_column: "abnormal_lab_rate"
      operator: "less_than"
      value: 0.50
    score_column: "care_gap_closure_score"
    prediction_column: "care_gap_closure_prediction"
    risk_tier_column: "care_gap_closure_tier"
    positive_label: 1

###############################################################################
# Risk Tier Rules
###############################################################################

risk_tiers:

  very_high:
    min_value: 0.85
    max_value: 1.00
    label: "Very High"
    priority_rank: 1

  high:
    min_value: 0.70
    max_value: 0.849999
    label: "High"
    priority_rank: 2

  moderate:
    min_value: 0.40
    max_value: 0.699999
    label: "Moderate"
    priority_rank: 3

  low:
    min_value: 0.00
    max_value: 0.399999
    label: "Low"
    priority_rank: 4

###############################################################################
# Validation Rules
###############################################################################

validation:
  enabled: true

  rules:

    required_inputs_exist:
      enabled: true
      severity: "ERROR"

    required_columns_exist:
      enabled: true
      severity: "ERROR"

    datasets_not_empty:
      enabled: true
      severity: "ERROR"

    member_key_not_null:
      enabled: true
      severity: "ERROR"

    target_distribution_check:
      enabled: true
      severity: "WARNING"

    model_training_success_check:
      enabled: true
      severity: "ERROR"

    scoring_output_row_count_check:
      enabled: true
      severity: "WARNING"

###############################################################################
# Metadata
###############################################################################

metadata:
  enabled: true

  include_column_statistics: true
  include_dataset_inventory: true
  include_feature_registry: true
  include_model_registry: true
  include_lineage: true

###############################################################################
# Audit
###############################################################################

audit:
  enabled: true

  include_step_audit: true
  include_validation_results: true
  include_execution_summary: true

###############################################################################
# End of File
###############################################################################