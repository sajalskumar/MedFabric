###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/models/medication_non_adherence.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Model:
#   Medication Non-Adherence Prediction Model
#
# Purpose:
#   Defines the complete configuration for the Medication Non-Adherence
#   prediction model.
#
# Business Objective:
#   Identify members who are likely to become non-adherent to prescribed
#   medications so that outreach and intervention programs can improve
#   medication compliance, reduce avoidable complications, and lower
#   downstream healthcare costs.
#
# This model supports:
#
#     • Medication Therapy Management (MTM)
#     • Pharmacy Care Management
#     • Population Health
#     • Quality Improvement Programs
#     • Medication Adherence Initiatives
#
# Target Strategy:
#   Members whose pharmacy utilization falls within the configured lower
#   quantile are labeled as positive examples representing potential
#   medication non-adherence.
#
# NOTE:
#   This target currently uses pharmacy claims volume as a proxy.
#   Future releases should replace this with a true adherence measure such as
#   PDC (Proportion of Days Covered) or MPR (Medication Possession Ratio).
#
###############################################################################

medication_non_adherence:

  ###########################################################################
  # Model Controls
  ###########################################################################

  enabled: true

  model_name: "Medication Non-Adherence Model"

  model_type: "classification"


  ###########################################################################
  # Target Definition
  ###########################################################################

  target:

    strategy: "quantile"

    output_column: "medication_non_adherence_target"

    source:

      dataset: "pharmacy_features"

      column: "total_pharmacy_claims"

    parameters:

      quantile: 0.20

      positive_direction: "less_than_or_equal"


  ###########################################################################
  # Scoring Output Columns
  ###########################################################################

  score_column: "medication_non_adherence_risk_score"

  prediction_column: "medication_non_adherence_prediction"

  risk_tier_column: "medication_non_adherence_risk_tier"

  positive_label: 1


  ###########################################################################
  # Optional Model-Specific Overrides
  #
  # These inherit the global framework defaults unless explicitly populated.
  ###########################################################################

  training_overrides: {}

  preprocessing_overrides: {}

  explainability_overrides: {}

  scoring_overrides: {}

  drift_overrides: {}

###############################################################################
# End of File
###############################################################################