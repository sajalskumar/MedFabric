###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/models/rising_risk.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Model:
#   Rising Risk Prediction Model
#
# Purpose:
#   Defines the complete configuration for the Rising Risk prediction model.
#
# Business Objective:
#   Identify members whose overall clinical or social risk is increasing so
#   that preventive interventions can occur before they become high-cost or
#   high-utilization members.
#
# This model supports:
#
#     • Population Health Management
#     • Preventive Care
#     • Care Management
#     • Risk Stratification
#     • Early Intervention Programs
#
# Target Strategy:
#   Members with the highest SDOH risk scores (or other configured future
#   risk indicators) above the specified quantile are labeled as positive
#   examples.
#
# This file is intentionally self-contained so future releases can introduce
# model-specific preprocessing, algorithms, explainability, scoring, or
# drift settings without impacting other prediction models.
#
###############################################################################

rising_risk:

  ###########################################################################
  # Model Controls
  ###########################################################################

  enabled: true

  model_name: "Rising Risk Model"

  model_type: "classification"


  ###########################################################################
  # Target Definition
  ###########################################################################

  target:

    strategy: "quantile"

    output_column: "rising_risk_target"

    source:

      dataset: "risk_features"

      column: "latest_sdoh_risk_score"

    parameters:

      quantile: 0.85

      positive_direction: "greater_than_or_equal"


  ###########################################################################
  # Scoring Output Columns
  ###########################################################################

  score_column: "rising_risk_score"

  prediction_column: "rising_risk_prediction"

  risk_tier_column: "rising_risk_tier"

  positive_label: 1


  ###########################################################################
  # Optional Model-Specific Overrides
  #
  # These inherit the global framework defaults unless explicitly populated.
  ###########################################################################

  training_overrides: {}

  preprocessing_overrides: {}

  explainability_overrides: {}

  scoring_overrides: {}

  drift_overrides: {}

###############################################################################
# End of File
###############################################################################