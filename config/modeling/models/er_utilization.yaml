###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/models/er_utilization.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Model:
#   Emergency Room Utilization Prediction Model
#
# Purpose:
#   Defines the complete configuration for the Emergency Room Utilization
#   prediction model.
#
# Business Objective:
#   Predict members who are likely to become high emergency department
#   utilizers. This model supports:
#
#     • Emergency Department Optimization
#     • Care Management
#     • Population Health
#     • Utilization Management
#     • Avoidable ER Reduction Initiatives
#
# Target Strategy:
#   Members whose utilization falls within the configured upper quantile
#   are labeled as positive examples.
#
# This file is intentionally self-contained so future releases can introduce
# model-specific preprocessing, algorithms, explainability, scoring, or
# drift settings without impacting other prediction models.
#
###############################################################################

er_utilization:

  ###########################################################################
  # Model Controls
  ###########################################################################

  enabled: true

  model_name: "ER Utilization Model"

  model_type: "classification"


  ###########################################################################
  # Target Definition
  ###########################################################################

  target:

    strategy: "quantile"

    output_column: "er_utilization_target"

    source:

      dataset: "utilization_features"

      column: "total_claims"

    parameters:

      quantile: 0.85

      positive_direction: "greater_than_or_equal"


  ###########################################################################
  # Scoring Output Columns
  ###########################################################################

  score_column: "er_utilization_risk_score"

  prediction_column: "er_utilization_prediction"

  risk_tier_column: "er_utilization_risk_tier"

  positive_label: 1


  ###########################################################################
  # Optional Model-Specific Overrides
  #
  # These inherit the global framework defaults unless explicitly populated.
  ###########################################################################

  training_overrides: {}

  preprocessing_overrides: {}

  explainability_overrides: {}

  scoring_overrides: {}

  drift_overrides: {}

###############################################################################
# End of File
###############################################################################