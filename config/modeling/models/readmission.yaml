###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/models/readmission.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Model:
#   Readmission Prediction Model
#
# Purpose:
#   Defines the complete configuration for the Readmission prediction model.
#
# Business Objective:
#   Predict members at elevated risk for hospital readmission using a
#   composite target derived from utilization, cost, pharmacy, and SDOH
#   indicators. The resulting scores support:
#
#     • Care Management
#     • Transitional Care
#     • Readmission Reduction Programs
#     • Population Health
#     • Clinical Risk Stratification
#
# Target Strategy:
#   A weighted composite score is calculated from multiple feature domains.
#   Members above the configured quantile threshold become positive examples.
#
# This file is intentionally self-contained so future releases can introduce
# model-specific preprocessing, algorithms, explainability, scoring, or
# drift settings without impacting other prediction models.
#
###############################################################################

readmission:

  ###########################################################################
  # Model Controls
  ###########################################################################

  enabled: true

  model_name: "Readmission Model"

  model_type: "classification"


  ###########################################################################
  # Target Definition
  ###########################################################################

  target:

    strategy: "weighted_score"

    output_column: "readmission_target"

    components:

      - dataset: "utilization_features"
        column: "total_claims"
        weight: 0.35
        direction: "positive"

      - dataset: "cost_features"
        column: "total_allowed_amount"
        weight: 0.20
        direction: "positive"

      - dataset: "cost_features"
        column: "total_paid_amount"
        weight: 0.20
        direction: "positive"

      - dataset: "pharmacy_features"
        column: "total_pharmacy_claims"
        weight: 0.10
        direction: "positive"

      - dataset: "sdoh_features"
        column: "latest_sdoh_risk_score"
        weight: 0.15
        direction: "positive"

    parameters:

      quantile: 0.85

      positive_direction: "greater_than_or_equal"


  ###########################################################################
  # Scoring Output Columns
  ###########################################################################

  score_column: "readmission_risk_score"

  prediction_column: "readmission_prediction"

  risk_tier_column: "readmission_risk_tier"

  positive_label: 1


  ###########################################################################
  # Optional Model-Specific Overrides
  #
  # These inherit the global framework defaults unless explicitly populated.
  ###########################################################################

  training_overrides: {}

  preprocessing_overrides: {}

  explainability_overrides: {}

  scoring_overrides: {}

  drift_overrides: {}

###############################################################################
# End of File
###############################################################################