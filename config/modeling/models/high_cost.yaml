###############################################################################
# MedFabric
# Enterprise Healthcare Data & AI Platform
#
# File:
#   config/modeling/models/high_cost.yaml
#
# Capability:
#   Enterprise Modeling Framework
#
# Model:
#   High Cost Prediction Model
#
# Purpose:
#   Defines the complete configuration for the High Cost prediction model.
#
# Business Objective:
#   Identify members who are expected to become the highest-cost members
#   within the prediction period. This model is intended to support:
#
#     • Care Management
#     • Case Management
#     • Population Health
#     • Cost Containment
#     • Early Intervention
#
# Target Strategy:
#   Members whose total paid amount falls within the configured upper
#   quantile are labeled as positive examples.
#
# This file is intentionally self-contained so additional model-specific
# settings can be added in future releases without affecting other models.
#
###############################################################################

high_cost:

  ###########################################################################
  # Model Controls
  ###########################################################################

  enabled: true

  model_name: "High Cost Model"

  model_type: "classification"


  ###########################################################################
  # Target Definition
  ###########################################################################

  target:

    strategy: "quantile"

    output_column: "high_cost_target"

    source:

      dataset: "cost_features"

      column: "total_paid_amount"

    parameters:

      quantile: 0.90

      positive_direction: "greater_than_or_equal"


  ###########################################################################
  # Scoring Output Columns
  ###########################################################################

  score_column: "high_cost_risk_score"

  prediction_column: "high_cost_prediction"

  risk_tier_column: "high_cost_risk_tier"

  positive_label: 1


  ###########################################################################
  # Future Model Overrides
  #
  # These sections intentionally inherit the global framework defaults.
  # Uncomment to override settings for this model only.
  ###########################################################################

  training_overrides: {}

  preprocessing_overrides: {}

  explainability_overrides: {}

  scoring_overrides: {}

  drift_overrides: {}

###############################################################################
# End of File
###############################################################################